            <textarea id="jsonInput" spellcheck="false">{
  "metadata": {
    "topic": "The Great Bond Car Wreck",
    "narrative_title": "The Tank That Read Empty"
  },
  "nodes": [
    {
      "id": "n1",
      "label": "Institutional Credibility",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": 0,
      "y": 0,
      "description": "The central reservoir of the system: fiscal trust (belief the government will balance its books) joined to monetary confidence (belief the central bank will protect the value of money). It fills slowly through decades of demonstrated discipline and drains invisibly while the gauge still reads full. The deficit itself breaks nothing; the draining of this reservoir is what breaks the system. [n1]"
    },
    {
      "id": "n2",
      "label": "Sovereign Bond Stress",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": 300,
      "y": -180,
      "description": "Accumulated pressure in the long-end government bond market, observed as surging 30-year yields across the G10 in May 2026. Rises when credibility falls and when external shocks land on a thinned buffer. It is the most visible gauge of the wreck but not its cause. [n2]"
    },
    {
      "id": "n3",
      "label": "Central Bank Intervention",
      "shape": "ellipse",
      "color": {
        "background": "#DBEAFE",
        "border": "#3B82F6"
      },
      "borderWidth": 1,
      "x": 320,
      "y": 40,
      "description": "The rescue reflex: QE, yield-curve control, emergency bond-buying that calms a panic (the Fed's 1.5 trillion in 2020, the ECB for Italy and Spain in 2022). It extinguishes the immediate fire using water drawn from the same credibility tank it is trying to keep full. [n3]"
    },
    {
      "id": "n4",
      "label": "Transferred Stress (Currency &amp; Inflation)",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": 600,
      "y": 60,
      "description": "Where the rescued stress relocates: onto the central-bank balance sheet, then into currency depreciation and embedded inflation. Stress is conserved, never eliminated, which is why 'a bit more inflation than expected' is structurally inevitable regardless of nominal policy. [n4]"
    },
    {
      "id": "n5",
      "label": "System Buffering Capacity",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": -320,
      "y": -120,
      "description": "The system's remaining ability to absorb shocks through slow, patient channels (fiscal consolidation, narrative repair, deliberative policy). It falls as credibility drains, leaving the system thin-skinned so that ever-smaller triggers can start the next fire. [n5]"
    },
    {
      "id": "n6",
      "label": "Steward Defection",
      "shape": "ellipse",
      "color": {
        "background": "#DBEAFE",
        "border": "#3B82F6"
      },
      "borderWidth": 1,
      "x": 300,
      "y": 220,
      "description": "Capital allocators quietly exiting the shared monetary contract, visible as the debasement trade into gold, silver, platinum, and low-debt currencies. It is not a hedge but a departure; every allocator who leaves makes the floor less able to bear those who stay. [n6]"
    },
    {
      "id": "n7",
      "label": "Equity-Bond Bifurcation",
      "shape": "ellipse",
      "color": {
        "background": "#DBEAFE",
        "border": "#3B82F6"
      },
      "borderWidth": 1,
      "x": 600,
      "y": 240,
      "description": "The split where bonds price doom while equities float on AI optimism and the rescue bet. It is not healthy diversity of opinion but the symptom of a system holding two contradictory stories at once because no part of it integrates them. [n7]"
    },
    {
      "id": "n8",
      "label": "Abstraction Coherence (Flow &amp; Stewards)",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": 880,
      "y": 220,
      "description": "The system's capacity to represent its own condition accurately through prices. As it collapses in the financial plumbing (Flow) and the allocators (Stewards), prices stop meaning anything and the system dreams its own solvency with its eyes open. [n8]"
    },
    {
      "id": "n9",
      "label": "Helm Coordination Capacity",
      "shape": "box",
      "color": {
        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": -320,
      "y": 180,
      "description": "The executive's ability to route stress through internal channels: to consolidate fiscally, defend monetary independence, and simply choose. When it collapses, the saturated system can no longer absorb pressure internally and must find a faster exit. [n9]"

      "borderWidth": 2.5,
      "x": -300,
      "y": -300,
      "description": "Treated by the podcast as the external trigger, but better read as the same late-phase fracture finding a kinetic exit when fiscal and monetary channels are saturated. The war and the wreck are twins of one depletion; the oil-price 'trigger' is the system's own fracture handed back as if from outside. [n10]"

      },
      "borderWidth": 1,
      "x": -620,
      "y": 20,
      "description": "The corrective mechanism by which a credibility slip triggers immediate currency punishment, forcing the discipline that refills the reservoir. Intact and brutal in disciplined emerging markets; severed in the reserve-currency hegemon, whose privilege removed the punishment and let the tank drain unchecked. [n11]"

        "background": "#CCFBF1",
        "border": "#14B8A6"
      },
      "borderWidth": 1,
      "x": -620,
      "y": 340,
      "description": "A slow stock of accumulated loyalty in the labour-and-saver base: the willingness of domestic households, pension funds, and insurers to hold government debt at near-zero yield out of identification with the state. Built across a high-cohesion postwar saver generation, it does not refill at the rate it drains because the demographic and cultural conditions that built it do not recur. In Japan it did the job the bond-market credibility premium does elsewhere. [n13]"

      "id": "n14",
      "label": "Domestic Stress Absorption (JGB)",
      "shape": "ellipse",
      "color": {
        "background": "#DBEAFE",
        "border": "#3B82F6"
      },
      "borderWidth": 1,
      "x": -300,
      "y": 380,
      "description": "The rate at which the patient domestic base soaks up bond stress at low yield, suppressing the market signal that would otherwise force discipline. It runs the system's stress through its own people rather than through the market, so the wreck looks slow rather than sudden. As the saver base ages and draws down, a saver becomes a spender and absorption reverses into selling. [n14]"
    }
  ],
  "edges": [
    {

      "from": "n1",
      "to": "n2",
      "width": 6,
      "lag": 4,
      "color": {

      },
      "label": "credibility falls,\nbond stress rises\n-\nLag: Years",

    {

      "to": "n3",
      "width": 5,
      "lag": 0,
      "color": {
        "color": "#1E40AF"
      },
      "label": "panic triggers\nthe rescue\n+\nLag: Days",

      "from": "n3",
      "to": "n4",

      "lag": 2,
      "color": {
        "color": "#1E40AF"
      },
      "label": "stress relocated,\nnot removed\n+\nLag: Quarters",

    <!-- Save Modal (Shared) -->
    <div id="saveModal" class="modal-overlay">
        <div class="modal-box" style="max-width: 450px;">
            <h2 id="saveModalTitle" style="margin:0; color:#111827;">Save Map</h2>
            <p style="margin:0; color:#6B7280; font-size:14px;">Enter a filename:</p>
            <input type="text" id="filenameInput" value="model">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="secondary" onclick="document.getElementById('saveModal').style.display='none'">Cancel</button>
                <button id="confirmSaveBtn">Download</button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // GLOBAL STATE
        let nodes, edges, network;
        let feedbackLoops = [], systemArchetypes = [], loopLabelPositions = [];
        let originalNodeStyles = {}, originalEdgeStyles = {};
        let currentSaveMode = 'html'; // 'html' or 'json'
        
        // INTERACTION STATE
        let draggedLabel = null;
        let dragOffset = {x:0, y:0};
        
        // RECURVE STATE
        let activeEdgeForRecurve = null;
        let isRecurvingEdge = false;
        
        let lastMouseX = 0, lastMouseY = 0;
        let draggedItem = null; // For list sorting

        // --- 0. AUTO-LOADER ---
        window.addEventListener('load', () => {
             const preloaded = document.getElementById('jsonInput').value;
             if(preloaded && preloaded.trim().length > 0 && preloaded.trim() !== "undefined") {
                 parseAndRun();
             } else {
                 document.getElementById('inputModal').style.display = 'flex';
             }
        });

        // --- HELPER FOR COLOR CONVERSION (from v6.2) ---
        function colorToRgba(colorInput, alpha) {
            let r = 128, g = 128, b = 128; // Default to gray if parsing fails
            alpha = Math.max(0, Math.min(1, alpha));

            if (typeof colorInput === 'string') {
                const s = colorInput.toLowerCase().trim();
                if (s.startsWith('#')) {
                    if (s.length === 4) {
                        r = parseInt(s[1] + s[1], 16);
                        g = parseInt(s[2] + s[2], 16);
                        b = parseInt(s[3] + s[3], 16);
                    } else if (s.length === 7) {
                        r = parseInt(s.substring(1, 3), 16);
                        g = parseInt(s.substring(3, 5), 16);
                        b = parseInt(s.substring(5, 7), 16);
                    }
                } else if (s.startsWith('rgb')) {
                    const parts = s.match(/[\d.]+/g);
                    if (parts && parts.length >= 3) {
                        r = parseInt(parts[0]);
                        g = parseInt(parts[1]);
                        b = parseInt(parts[2]);
                    }
                }
            }
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // --- 1. DATA PARSING ---
        function parseAndRun() {
            const input = document.getElementById('jsonInput').value;
            if(!input) return alert("Please paste JSON data.");

            try {
                let clean = input.replace(/```json/gi, '').replace(/```/g, '');
                const start = clean.indexOf('{');
                const end = clean.lastIndexOf('}');
                if (start === -1 || end === -1) throw new Error("No JSON found.");
                
                const data = JSON.parse(clean.substring(start, end + 1));
                
                document.getElementById('inputModal').style.display = 'none';

                if(data.metadata && data.metadata.topic) {
                    document.getElementById('modelTitleDisplay').innerText = data.metadata.topic;
                    document.title = data.metadata.topic;
                }

                initEngine(data);

            } catch(e) {
                alert("Error parsing JSON: " + e.message);
            }
        }

        document.getElementById('loadNewButton').addEventListener('click', () => {
             document.getElementById('jsonInput').value = '';
             document.getElementById('inputModal').style.display = 'flex';
        });

        // --- SAVE FUNCTIONALITY ---
        
        // 1. Save HTML Button
        document.getElementById('saveButton').addEventListener('click', () => {
            if (!network || !nodes || !edges) {
                alert("No model to save. Please load data first.");
                return;
            }
            currentSaveMode = 'html';
            document.getElementById('saveModalTitle').innerText = "Save Map (HTML)";
            document.getElementById('filenameInput').value = (document.title || "model");
            document.getElementById('saveModal').style.display = 'flex';
            document.getElementById('filenameInput').focus();
        });

        // 2. Save JSON Button
        document.getElementById('saveDataButton').addEventListener('click', () => {
            if (!network || !nodes || !edges) {
                alert("No model data to save.");
                return;
            }
            currentSaveMode = 'json';
            document.getElementById('saveModalTitle').innerText = "Save Map Data (JSON)";
            document.getElementById('filenameInput').value = (document.title || "model");
            document.getElementById('saveModal').style.display = 'flex';
            document.getElementById('filenameInput').focus();
        });

        // 3. Confirm Save Action
        document.getElementById('confirmSaveBtn').addEventListener('click', () => {
             try {
                let filename = document.getElementById('filenameInput').value || "model";
                
                // Get Data
                const currentPositions = network.getPositions();
                const d = { 
                    metadata: { topic: document.title },
                    nodes: nodes.get().map(n => {
                        const pos = currentPositions[n.id];
                        return {
                            ...n,
                            x: pos ? Math.round(pos.x) : n.x,
                            y: pos ? Math.round(pos.y) : n.y
                        };
                    }),
                    edges: edges.get().map(e => ({
                        ...e, 
                        title: undefined,
                        smooth: (e.smooth && e.smooth.roundness !== undefined) ? e.smooth : undefined
                    })),
                    loops: feedbackLoops,
                    archetypes: systemArchetypes
                };
                const jsonString = JSON.stringify(d, null, 2);

                if (currentSaveMode === 'json') {
                    // --- SAVE JSON ---
                    if (!filename.toLowerCase().endsWith('.json')) filename += '.json';
                    downloadFile(jsonString, filename, 'application/json');

                } else {
                    // --- SAVE HTML ---
                    if (!filename.toLowerCase().endsWith('.html')) filename += '.html';

                    const clone = document.documentElement.cloneNode(true);
                    clone.querySelector('#cldNetwork').innerHTML = ''; 
                    clone.querySelectorAll('.tooltip').forEach(el => el.style.display = 'none');
                    clone.querySelectorAll('.legend-container').forEach(el => el.classList.remove('expanded'));
                    clone.querySelector('#descPanel').style.display = 'none';
                    clone.querySelector('#inputModal').style.display = 'flex'; 
                    clone.querySelector('#saveModal').style.display = 'none'; 
                    clone.querySelector('#jsonInput').textContent = jsonString;

                    const fileContent = "<!DOCTYPE html>\n" + clone.outerHTML;
                    downloadFile(fileContent, filename, 'text/html');
                }

                document.getElementById('saveModal').style.display = 'none';

            } catch (err) {
                alert("Error saving file: " + err.message);
                console.error(err);
            }
        });

        function downloadFile(content, filename, contentType) {
            const blob = new Blob([content], {type: contentType});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = filename; 
            a.style.display = 'none';
            document.body.appendChild(a); 
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // --- 2. ENGINE INITIALIZATION ---
        function initEngine(data) {
            const hasPositions = data.nodes && data.nodes.some(n => n.x !== undefined && n.y !== undefined);

            // MODIFIED: Append [ID] to node labels (without hardcoded 'n')
            const nodeData = (data.nodes || []).map(n => {
                let label = n.label || "";
                const tag = `[${n.id}]`; // Corrected: uses pure ID
                // Prevent duplicate appending if data is re-loaded
                if (!label.includes(tag)) {
                    label = label ? `${label} ${tag}` : tag;
                }
                return {
                    ...n, 
                    label: label,
                    x: n.x ? Number(n.x) : undefined, 
                    y: n.y ? Number(n.y) : undefined
                };
            });
            
            // MODIFIED: Append [ID] to edge labels (without hardcoded 'e')
            const edgeData = (data.edges || []).map(e => {
                let smooth = { enabled: true, type: "cubicBezier", roundness: 0.3 };
                if (e.smooth && e.smooth.roundness !== undefined) {
                    smooth = e.smooth; 
                }
                
                let label = e.label || "";
                const tag = `[${e.id}]`; // Corrected: uses pure ID
                // Prevent duplicate appending and ensure ID is visible
                if (!label.includes(tag)) {
                    label = label ? `${label} ${tag}` : tag;
                }

                return {...e, label: label, from:String(e.from), to:String(e.to), title:undefined, smooth: smooth};
            });

            nodes = new vis.DataSet(nodeData);
            edges = new vis.DataSet(edgeData);
            
            feedbackLoops = (data.loops || []).map((l, i) => ({...l, internalId: `loop-${i}`}));
            systemArchetypes = data.archetypes || [];

            const container = document.getElementById('cldNetwork');
            const options = {
                autoResize: true, height: '100%', width: '100%',
                nodes: { 
                    shape: 'ellipse', size: 25, 
                    font: { size: 13, face: 'Inter', color: '#1F2937', multi: 'html' },
                    widthConstraint: { maximum: 160 }, borderWidth: 2,
                    color: { background: '#DBEAFE', border: '#3B82F6', highlight: { background: '#BFDBFE', border: '#2563EB' } },
                    shadow: { enabled: true, size:4, x:2, y:2, color: 'rgba(0,0,0,0.08)'} 
                },
                edges: { 
                    width: 2.5, arrows: { to: { enabled: true, scaleFactor: 0.7 } },
                    smooth: { enabled: true, type: "cubicBezier", roundness: 0.3 },
                    font: { align: 'middle', multi: true, face: 'Inter', size: 12, color: '#4B5563', background: 'rgba(255,255,255,0.75)', strokeWidth: 0 },
                    chosen: {
                        edge: function(values, id, selected, hovering) {
                            values.color = '#e11d48'; 
                            values.width = values.width * 1.5;
                            values.shadow = { enabled: true, color: 'rgba(225, 29, 72, 0.4)', size: 10 };
                        }
                    }
                },
                physics: {
                    enabled: !hasPositions,
                    stabilization: { enabled: !hasPositions, iterations: 1000, fit: true },
                    barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 95 }
                },
                interaction: { 
                    hover: true, dragNodes: true, zoomView: true, 
                    selectConnectedEdges: false 
                }
            };

            nodes.forEach(n => originalNodeStyles[n.id] = { color: {...(n.color||options.nodes.color)}, borderWidth: n.borderWidth||2 });
            edges.forEach(e => originalEdgeStyles[e.id] = { color: {...(e.color||options.edges.color)}, width: e.width||2.5, smooth: e.smooth });

            if(network) network.destroy();
            network = new vis.Network(container, { nodes, edges }, options);
            
            if(!hasPositions) {
                network.on("stabilizationIterationsDone", () => network.setOptions({ physics: false }));
            }

            renderLists();
            setupInteractions();
            setupListSorting(); 
        }

        // --- 3. CUSTOM INTERACTION LOGIC ---
        function setupInteractions() {
            const canvas = document.querySelector('canvas');
            const tt = document.getElementById('mainTooltip');
            const ctt = document.getElementById('canvasTooltip');

            // --- CLICK (SELECTION) ---
            network.on("click", function(params) {
                const networkPos = params.pointer.canvas; 

                const hit = loopLabelPositions.find(l => (networkPos.x-l.x)**2 + (networkPos.y-l.y)**2 < l.r**2);
                if(hit) {
                    selectLoop(hit.loop);
                    return; 
                }

                if (params.nodes.length === 0) { 
                    if (params.edges.length > 0) { 
                        const clickedEdgeId = params.edges[0];
                        activeEdgeForRecurve = (activeEdgeForRecurve === clickedEdgeId) ? null : clickedEdgeId;
                        if(activeEdgeForRecurve) {
                            network.selectEdges([activeEdgeForRecurve]);
                            resetHighlights(false); 
                        } else {
                            network.selectEdges([]);
                        }
                    } else { 
                        activeEdgeForRecurve = null;
                        network.selectEdges([]);
                        resetHighlights();
                    }
                } else {
                    activeEdgeForRecurve = null;
                    network.selectEdges([]);
                }
            });

            // --- MOUSE DOWN (START DRAG) ---
            if(canvas) {
                canvas.addEventListener('mousedown', function(event) {
                    const rect = canvas.getBoundingClientRect();
                    const netPos = network.canvas.DOMtoCanvas({x: event.clientX-rect.left, y: event.clientY-rect.top});
                    
                    const hit = loopLabelPositions.find(l => (netPos.x-l.x)**2 + (netPos.y-l.y)**2 < l.r**2);
                    if(hit) {
                        draggedLabel = hit.loop;
                        dragOffset = {x: netPos.x - hit.x, y: netPos.y - hit.y};
                        network.setOptions({interaction:{dragNodes:false, dragView:false}}); 
                        canvas.style.cursor = 'grabbing';
                        event.preventDefault();
                        return;
                    }

                    if (activeEdgeForRecurve && !isRecurvingEdge) {
                        isRecurvingEdge = true;
                        document.addEventListener('mousemove', handleMouseMoveOnDocumentForRecurve);
                        document.addEventListener('mouseup', handleMouseUpOnDocumentForRecurve, { once: true });
                        network.setOptions({ interaction: { dragNodes: false, dragView: false } }); 
                        event.preventDefault();
                    }
                });

                canvas.addEventListener('mousemove', (e) => {
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;

                    if(draggedLabel) {
                        const rect = canvas.getBoundingClientRect();
                        const netPos = network.canvas.DOMtoCanvas({x: e.clientX-rect.left, y: e.clientY-rect.top});
                        draggedLabel.lx = netPos.x - dragOffset.x;
                        draggedLabel.ly = netPos.y - dragOffset.y;
                        network.redraw(); 
                        return;
                    }

                    const rect = canvas.getBoundingClientRect();
                    const netPos = network.canvas.DOMtoCanvas({x: e.clientX-rect.left, y: e.clientY-rect.top});
                    const hit = loopLabelPositions.find(l => (netPos.x-l.x)**2 + (netPos.y-l.y)**2 < l.r**2);
                    
                    if(hit) {
                        canvas.style.cursor = 'pointer';
                        ctt.innerHTML = `<strong>${hit.loop.name}</strong><p style="margin:5px 0 0">${hit.loop.description}</p>`;
                        ctt.style.left = (e.clientX+15)+'px'; ctt.style.top = (e.clientY+15)+'px';
                        ctt.style.display = 'block';
                    } else {
                         ctt.style.display = 'none';
                    }
                });

                canvas.addEventListener('mouseup', () => {
                    if(draggedLabel) {
                        draggedLabel = null;
                        network.setOptions({interaction:{dragNodes:true, dragView:true}});
                        canvas.style.cursor = 'default';
                    }
                });
            }


            // --- RECURVE HELPERS ---
            function handleMouseMoveOnDocumentForRecurve(event) {
                if (!isRecurvingEdge || !activeEdgeForRecurve) return;

                const rect = canvas.getBoundingClientRect();
                const mousePos = network.canvas.DOMtoCanvas({ x: event.clientX - rect.left, y: event.clientY - rect.top });
                const edge = edges.get(activeEdgeForRecurve);
                if (!edge) { handleMouseUpOnDocumentForRecurve(); return; }

                const positions = network.getPositions([edge.from, edge.to]);
                const fromPos = positions[edge.from];
                const toPos = positions[edge.to];
                if (!fromPos || !toPos) { handleMouseUpOnDocumentForRecurve(); return;}

                const midX = (fromPos.x + toPos.x) / 2;
                const midY = (fromPos.y + toPos.y) / 2;
                const dxMouse = mousePos.x - midX;
                const dyMouse = mousePos.y - midY;

                const edgeDx = toPos.x - fromPos.x;
                const edgeDy = toPos.y - fromPos.y;
                const edgeLength = Math.sqrt(edgeDx*edgeDx + edgeDy*edgeDy);
                if (edgeLength < 1) return;

                const orientation = (edgeDx * dyMouse) - (edgeDy * dxMouse);
                const newCurveType = orientation >= 0 ? 'curvedCCW' : 'curvedCW';

                const distFromMid = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
                const scaleFactor = 0.8; 
                let newRoundness = Math.max(0.0, Math.min(1.0, (distFromMid / edgeLength) * scaleFactor));

                edges.update({
                    id: activeEdgeForRecurve,
                    smooth: { type: newCurveType, roundness: newRoundness, enabled: true }
                });
                
                if(originalEdgeStyles[activeEdgeForRecurve]) {
                    originalEdgeStyles[activeEdgeForRecurve].smooth = { type: newCurveType, roundness: newRoundness, enabled: true };
                }
            }

            function handleMouseUpOnDocumentForRecurve() {
                if (!isRecurvingEdge) return;
                isRecurvingEdge = false;
                document.removeEventListener('mousemove', handleMouseMoveOnDocumentForRecurve);
                network.setOptions({ interaction: { dragNodes: true, dragView: true } });
            }


            // --- STANDARD VIS.JS EVENTS ---
            network.on("afterDrawing", (ctx) => {
                loopLabelPositions = [];
                ctx.font = "bold 13px Inter"; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                feedbackLoops.forEach(l => {
                    if(!l.lx) {
                        const pos = network.getPositions(l.nodeIds);
                        let x=0,y=0,c=0; for(let k in pos){x+=pos[k].x; y+=pos[k].y; c++;}
                        if(c){l.lx=x/c; l.ly=y/c;}
                    }
                    if(l.lx) {
                        ctx.fillStyle = l.type==='R' ? 'rgba(190, 24, 93, 0.9)' : 'rgba(30, 64, 175, 0.9)';
                        ctx.beginPath(); ctx.arc(l.lx, l.ly, 18, 0, 2*Math.PI); ctx.fill();
                        ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
                        ctx.fillStyle = 'white'; ctx.fillText(l.id, l.lx, l.ly+1);
                        loopLabelPositions.push({loop: l, x: l.lx, y: l.ly, r: 18});
                    }
                });
            });

            network.on("hoverNode", (p) => {
                const n = nodes.get(p.node);
                if(n.description) {
                    const dom = network.canvas.canvasToDOM(network.getPositions([p.node])[p.node]);
                    tt.innerHTML = n.description.replace(/\n/g, '<br>');
                    tt.style.left = (dom.x + 20) + 'px'; tt.style.top = (dom.y + 20) + 'px';
                    tt.style.display = 'block';
                }
            });
            network.on("blurNode", () => tt.style.display = 'none');

            network.on("hoverEdge", (p) => {
                const e = edges.get(p.edge);
                if(e.description) {
                    tt.innerHTML = e.description.replace(/\n/g, '<br>');
                    tt.style.left = (lastMouseX + 15) + 'px';
                    tt.style.top = (lastMouseY + 15) + 'px';
                    tt.style.display = 'block';
                }
            });
            network.on("blurEdge", () => tt.style.display = 'none');
        }

        // --- 4. LIST SORTING & RENDERING (UPDATED) ---
        function setupListSorting() {
            const list = document.getElementById('loopList');
            
            list.addEventListener('dragstart', (e) => {
                if(e.target.tagName === 'LI') {
                    draggedItem = e.target;
                    setTimeout(() => draggedItem.classList.add('dragging'), 0);
                }
            });

            list.addEventListener('dragend', () => {
                if(draggedItem) draggedItem.classList.remove('dragging');
                draggedItem = null;
            });

            list.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(list, e.clientY);
                const current = document.querySelector('.dragging');
                if (afterElement == null) {
                    list.appendChild(current);
                } else {
                    list.insertBefore(current, afterElement);
                }
            });

            list.addEventListener('drop', () => {
                // REORDER DATA ARRAY
                const newOrder = [];
                list.querySelectorAll('li').forEach(li => {
                    const loop = feedbackLoops.find(l => l.internalId === li.dataset.id);
                    if(loop) newOrder.push(loop);
                });
                feedbackLoops = newOrder;
                
                // NO RESEQUENCING - Just redraw to ensure consistency
                renderLists();
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('li:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function renderLists() {
            const ll = document.getElementById('loopList'); ll.innerHTML = '';
            feedbackLoops.forEach(l => {
                const li = document.createElement('li');
                li.setAttribute('draggable', true);
                li.dataset.id = l.internalId;

                const col = l.type==='R'?'#be185d':'#1e40af';
                let nameDisplay = l.name;
                
                if (!nameDisplay.startsWith(l.id)) {
                    nameDisplay = `<span style="font-weight:bold; color:${col}">${l.id}</span>: ${nameDisplay}`;
                } else {
                    nameDisplay = nameDisplay.replace(l.id, `<span style="font-weight:bold; color:${col}">${l.id}</span>`);
                }

                li.innerHTML = nameDisplay;
                li.onclick = (e) => { e.stopPropagation(); selectLoop(l); };
                ll.appendChild(li);
            });
            const al = document.getElementById('archetypeList'); al.innerHTML = '';
            systemArchetypes.forEach(a => {
                const li = document.createElement('li'); li.textContent = a.name;
                li.onclick = (e) => { e.stopPropagation(); selectArch(a); };
                al.appendChild(li);
            });
        }

        function selectLoop(l) {
            highlight(l);
            const box = document.getElementById('descPanel');
            box.innerHTML = `<strong>${l.name}</strong>${l.description.replace(/\n/g,'<br>')}`;
            box.style.display='block';
            if(!document.getElementById('legend').classList.contains('expanded')) toggleLegend('legend');
        }

        function selectArch(a) {
            highlight(a);
            const box = document.getElementById('descPanel');
            box.innerHTML = `<strong>${a.name}</strong>${a.description.replace(/\n/g,'<br>')}`;
            box.style.display='block';
            if(!document.getElementById('archetypeLegend').classList.contains('expanded')) toggleLegend('archetypeLegend');
        }

        // --- UPDATED HIGHLIGHT FUNCTION (v6.2 logic) ---
        function highlight(item) {
            if (!item || !item.nodeIds || !item.edgeIds) {
                resetHighlights(true);
                return;
            }

            resetHighlights(false); 

            const ns = new Set(item.nodeIds || []), es = new Set(item.edgeIds || []);
            const nodesToUpdate = [];
            const edgesToUpdate = [];
            const highlightColor = '#e11d48'; 
            const dimOpacity = 0.15;

            // --- Process Nodes ---
            nodes.forEach(n => {
                const originalStyle = originalNodeStyles[n.id];
                if (!originalStyle) return;

                if (ns.has(n.id)) {
                    nodesToUpdate.push({
                        id: n.id,
                        opacity: 1.0,
                        color: JSON.parse(JSON.stringify(originalStyle.color)),
                        borderWidth: (originalStyle.borderWidth || 2) * 1.7
                    });
                } else {
                    nodesToUpdate.push({
                        id: n.id,
                        opacity: dimOpacity,
                        color: {
                            background: colorToRgba(originalStyle.color?.background, dimOpacity * 0.5),
                            border: colorToRgba(originalStyle.color?.border, dimOpacity),
                            highlight: { background: colorToRgba(originalStyle.color?.highlight?.background, dimOpacity * 0.5), border: colorToRgba(originalStyle.color?.highlight?.border, dimOpacity) },
                            hover: { background: colorToRgba(originalStyle.color?.hover?.background, dimOpacity * 0.5), border: colorToRgba(originalStyle.color?.hover?.border, dimOpacity) }
                        },
                        borderWidth: (originalStyle.borderWidth || 2),
                        font: {
                            color: colorToRgba(nodes.get(n.id).font?.color || '#1F2937', dimOpacity)
                        }
                    });
                }
            });

            // --- Process Edges ---
            edges.forEach(e => {
                const originalStyle = originalEdgeStyles[e.id];
                if (!originalStyle) return;
                const defaultWidth = 2.5;

                if (es.has(e.id)) {
                    edgesToUpdate.push({
                        id: e.id,
                        width: (originalStyle.width || defaultWidth) * 1.8,
                        color: { color: highlightColor, highlight: highlightColor, hover: highlightColor },
                        font: {
                            color: '#000000',
                            background: 'rgba(255, 255, 255, 0.9)'
                        },
                        opacity: 1.0,
                        smooth: JSON.parse(JSON.stringify(originalStyle.smooth || {}))
                    });
                } else {
                    const dimmedColor = colorToRgba(originalStyle.color?.color, dimOpacity * 0.8);
                    edgesToUpdate.push({
                        id: e.id,
                        width: (originalStyle.width || defaultWidth) * 0.8,
                        color: { color: dimmedColor, highlight: dimmedColor, hover: dimmedColor },
                        font: {
                            color: colorToRgba(edges.get(e.id).font?.color || '#4B5563', dimOpacity * 0.5),
                            background: 'rgba(255, 255, 255, 0.2)'
                        },
                        opacity: dimOpacity,
                        smooth: JSON.parse(JSON.stringify(originalStyle.smooth || {}))
                    });
                }
            });

            nodes.update(nodesToUpdate);
            edges.update(edgesToUpdate);
        }

        // --- UPDATED RESET HIGHLIGHTS ---
        function resetHighlights(fullReset = true) {
            const nodeUpdates = nodes.get().map(n => {
                const s = originalNodeStyles[n.id] || { color: '#DBEAFE', borderWidth: 2 };
                return { 
                    id: n.id, 
                    opacity: 1, 
                    color: s.color, 
                    borderWidth: s.borderWidth,
                    font: { color: '#1F2937' } 
                };
            });
            const edgeUpdates = edges.get().map(e => {
                const s = originalEdgeStyles[e.id] || { color: '#4B5563', width: 2.5 };
                return { 
                    id: e.id, 
                    opacity: 1, 
                    color: s.color, 
                    width: s.width,
                    font: { color: '#4B5563', background: 'rgba(255,255,255,0.75)' } 
                };
            });

            nodes.update(nodeUpdates);
            edges.update(edgeUpdates);

            if(fullReset) {
                document.getElementById('descPanel').style.display='none';
                document.querySelectorAll('.legend-container').forEach(l => l.classList.remove('expanded'));
            }
        }

        window.toggleLegend = (id) => {
            const el = document.getElementById(id);
            const exp = el.classList.contains('expanded');
            document.querySelectorAll('.legend-container').forEach(l => l.classList.remove('expanded'));
            document.getElementById('descPanel').style.display = 'none';
            if(!exp) el.classList.add('expanded');
        }
    </script>
</body>
