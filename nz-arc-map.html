        function colorToRgba(colorInput, alpha) {
            let r = 128, g = 128, b = 128;
            alpha = Math.max(0, Math.min(1, alpha));
            if (typeof colorInput === 'string') {
                const s = colorInput.toLowerCase().trim();
                if (s.startsWith('#')) {
                    if (s.length === 4) {
                        r = parseInt(s[1] + s[1], 16);
                        g = parseInt(s[2] + s[2], 16);
                        b = parseInt(s[3] + s[3], 16);
                    } else if (s.length === 7) {
                        r = parseInt(s.substring(1, 3), 16);
                        g = parseInt(s.substring(3, 5), 16);
                        b = parseInt(s.substring(5, 7), 16);
                    }

            return `rgba(${r},${g},${b},${alpha})`;

        function initEngine(data) {
            const hasPositions = data.nodes && data.nodes.some(n => n.x !== undefined && n.y !== undefined);
            const nodeData = (data.nodes || []).map(n => {

                edges: { width: 2.5, arrows: { to: { enabled: true, scaleFactor: 0.7 } }, smooth: { enabled: true, type: "cubicBezier", roundness: 0.3 }, font: { align: 'middle', multi: true, face: 'Inter', size: 12, color: '#4B5563', background: 'rgba(255,255,255,0.75)', strokeWidth: 0 }, chosen: { edge: function(values, id, selected, hovering) { values.color = '#e11d48'; values.width = values.width * 1.5; values.shadow = { enabled: true, color: 'rgba(225, 29, 72, 0.4)', size: 10 }; } } },

        function setupInteractions() {

            if(canvas) {

                    const rect = canvas.getBoundingClientRect();

                    if(hit) {draggedLabel = hit.loop; dragOffset = {x: netPos.x - hit.x, y: netPos.y - hit.y}; network.setOptions({interaction:{dragNodes:false, dragView:false}}); canvas.style.cursor = 'grabbing'; event.preventDefault(); return;}
                    if (activeEdgeForRecurve && !isRecurvingEdge) {

                        const rect = canvas.getBoundingClientRect();

                        draggedLabel.lx = netPos.x - dragOffset.x;
                        draggedLabel.ly = netPos.y - dragOffset.y;
                        network.redraw();
                        return;
                    }
                    const rect = canvas.getBoundingClientRect();
                    const netPos = network.canvas.DOMtoCanvas({x: e.clientX-rect.left, y: e.clientY-rect.top});
                    const hit = loopLabelPositions.find(l => (netPos.x-l.x)**2 + (netPos.y-l.y)**2 < l.r**2);
                    if(hit) {
                        canvas.style.cursor = 'pointer';
                        ctt.innerHTML = `<strong>${hit.loop.name}</strong><p style="margin:5px 0 0">${hit.loop.description}</p>`;
                        ctt.style.left = (e.clientX+15)+'px'; ctt.style.top = (e.clientY+15)+'px';

                });
                canvas.addEventListener('mouseup', () => {if(draggedLabel) {draggedLabel = null; network.setOptions({interaction:{dragNodes:true, dragView:true}}); canvas.style.cursor = 'default';}});
            }
            function handleMouseMoveOnDocumentForRecurve(event) {
                if (!isRecurvingEdge || !activeEdgeForRecurve) return;
                const rect = canvas.getBoundingClientRect();
                const mousePos = network.canvas.DOMtoCanvas({ x: event.clientX - rect.left, y: event.clientY - rect.top });
                const edge = edges.get(activeEdgeForRecurve);
                if (!edge) { handleMouseUpOnDocumentForRecurve(); return; }
                const positions = network.getPositions([edge.from, edge.to]);
                const fromPos = positions[edge.from];
                const toPos = positions[edge.to];
                if (!fromPos || !toPos) { handleMouseUpOnDocumentForRecurve(); return;}
                const midX = (fromPos.x + toPos.x) / 2;
                const midY = (fromPos.y + toPos.y) / 2;
                const dxMouse = mousePos.x - midX;
                const dyMouse = mousePos.y - midY;
                const edgeDx = toPos.x - fromPos.x;
                const edgeDy = toPos.y - fromPos.y;
                const edgeLength = Math.sqrt(edgeDx*edgeDx + edgeDy*edgeDy);
                if (edgeLength < 1) return;
                const orientation = (edgeDx * dyMouse) - (edgeDy * dxMouse);
                const newCurveType = orientation >= 0 ? 'curvedCCW' : 'curvedCW';
                const distFromMid = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
                const scaleFactor = 0.8;
                let newRoundness = Math.max(0.0, Math.min(1.0, (distFromMid / edgeLength) * scaleFactor));
                edges.update({id: activeEdgeForRecurve, smooth: { type: newCurveType, roundness: newRoundness, enabled: true }});
                if(originalEdgeStyles[activeEdgeForRecurve]) {originalEdgeStyles[activeEdgeForRecurve].smooth = { type: newCurveType, roundness: newRoundness, enabled: true };}
            }

                    if(l.lx) {
                        ctx.fillStyle = l.type==='R' ? 'rgba(190, 24, 93, 0.9)' : 'rgba(30, 64, 175, 0.9)';

        function setupListSorting() {

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('li:not(.dragging)')];

        function highlight(item) {
            if (!item || !item.nodeIds || !item.edgeIds) {resetHighlights(true); return;}
            resetHighlights(false);
            const ns = new Set(item.nodeIds || []), es = new Set(item.edgeIds || []);
            const nodesToUpdate = [], edgesToUpdate = [];

            const dimOpacity = 0.15;

                    nodesToUpdate.push({id: n.id, opacity: 1.0, color: JSON.parse(JSON.stringify(originalStyle.color)), borderWidth: (originalStyle.borderWidth || 2) * 1.7});
                } else {
                    nodesToUpdate.push({id: n.id, opacity: dimOpacity, color: {background: colorToRgba(originalStyle.color?.background, dimOpacity * 0.5), border: colorToRgba(originalStyle.color?.border, dimOpacity), highlight: { background: colorToRgba(originalStyle.color?.highlight?.background, dimOpacity * 0.5), border: colorToRgba(originalStyle.color?.highlight?.border, dimOpacity) }, hover: { background: colorToRgba(originalStyle.color?.hover?.background, dimOpacity * 0.5), border: colorToRgba(originalStyle.color?.hover?.border, dimOpacity) }}, borderWidth: (originalStyle.borderWidth || 2), font: {color: colorToRgba(nodes.get(n.id).font?.color || '#1F2937', dimOpacity)}});
                }
            });
            edges.forEach(e => {
                const originalStyle = originalEdgeStyles[e.id];
                if (!originalStyle) return;
                const defaultWidth = 2.5;
                if (es.has(e.id)) {
                    edgesToUpdate.push({id: e.id, width: (originalStyle.width || defaultWidth) * 1.8, color: { color: highlightColor, highlight: highlightColor, hover: highlightColor }, font: {color: '#000000', background: 'rgba(255, 255, 255, 0.9)'}, opacity: 1.0, smooth: JSON.parse(JSON.stringify(originalStyle.smooth || {}))});
                } else {
                    const dimmedColor = colorToRgba(originalStyle.color?.color, dimOpacity * 0.8);
                    edgesToUpdate.push({id: e.id, width: (originalStyle.width || defaultWidth) * 0.8, color: { color: dimmedColor, highlight: dimmedColor, hover: dimmedColor }, font: {color: colorToRgba(edges.get(e.id).font?.color || '#4B5563', dimOpacity * 0.5), background: 'rgba(255, 255, 255, 0.2)'}, opacity: dimOpacity, smooth: JSON.parse(JSON.stringify(originalStyle.smooth || {}))});
                }
            });
            nodes.update(nodesToUpdate);
            edges.update(edgesToUpdate);
        }
        function resetHighlights(fullReset = true) {
            const nodeUpdates = nodes.get().map(n => {const s = originalNodeStyles[n.id] || { color: '#DBEAFE', borderWidth: 2 }; return { id: n.id, opacity: 1, color: s.color, borderWidth: s.borderWidth, font: { color: '#1F2937' } };});
            const edgeUpdates = edges.get().map(e => {const s = originalEdgeStyles[e.id] || { color: '#4B5563', width: 2.5 }; return { id: e.id, opacity: 1, color: s.color, width: s.width, font: { color: '#4B5563', background: 'rgba(255,255,255,0.75)' } };});
            nodes.update(nodeUpdates);
            edges.update(edgeUpdates);
            if(fullReset) {document.getElementById('descPanel').style.display='none'; document.querySelectorAll('.legend-container').forEach(l => l.classList.remove('expanded'));}
        }
        window.toggleLegend = (id) => {const el = document.getElementById(id); const exp = el.classList.contains('expanded'); document.querySelectorAll('.legend-container').forEach(l => l.classList.remove('expanded')); document.getElementById('descPanel').style.display = 'none'; if(!exp) el.classList.add('expanded');}
    </script>
<script src="custom-select.js"></script>
</body>
</html>
